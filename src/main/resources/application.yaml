spring:

  application:
    name: nikodev

  datasource:
    url: jdbc:postgresql://localhost:5432/pokedex_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  data:
    mongodb:
      uri: mongodb://localhost:27017/pokedex_stats

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForDevelopmentOnly1234567890}
    expiration-ms: 86400000
